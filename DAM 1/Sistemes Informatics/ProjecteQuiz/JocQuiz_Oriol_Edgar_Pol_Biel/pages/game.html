<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregunta</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="standard-page">

    <main class="panel-page">
        <header class="page-header">
            <div class="corner-icons left">¿ ?</div>
            <div class="header-center">
                <h1 class="page-title" id="modeTitle">MODE</h1>
                <p class="question-label" id="questionCounter">PREGUNTA</p>
                <p id="player-display" class="player-display"></p>
            </div>
            <div class="corner-icons right">? ?</div>
        </header>

        <div class="divider"></div>

        <section class="timer-row">
            <div class="timer-box">Temps: <span id="countdown">15</span>s</div>
        </section>

        <section class="game-layout">
            <div class="answers-column">
                <h2 class="question-text" id="questionText">Pregunta</h2>
                <button class="answer-btn" type="button"></button>
                <button class="answer-btn" type="button"></button>
                <button class="answer-btn" type="button"></button>
                <button class="answer-btn" type="button"></button>
            </div>

            <div class="image-column">
                <div class="question-image-box question-symbol" id="questionSymbol">?</div>
                <img class="flag-image" id="flagImage" src="" alt="Bandera">
            </div>
        </section>
    </main>

    <script src="../js/game.js"></script>
</body>
</html>
